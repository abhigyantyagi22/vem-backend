spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vem_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345678}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${SERVER_PORT:8080}

# Require JWT_SECRET to be provided via environment in production.
# Allow an empty default so Spring can start and the JwtSecretValidator
# will emit a clear error if the secret is missing or invalid.
app.jwt.secret=${JWT_SECRET:}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# Email (monthly digest). Set SPRING_MAIL_USERNAME / SPRING_MAIL_PASSWORD
# (e.g. a Gmail address + app password) to enable sending.
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${APP_MAIL_FROM:}
